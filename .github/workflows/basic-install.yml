name: Basic install

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  basic-install:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Install Morpho dependencies
      run: |
        sudo apt update
        sudo apt install -y libsuitesparse-dev liblapacke-dev libunistring-dev

    - name: Build and install Morpho
      run: |
        git clone --depth 1 --branch dev https://github.com/Morpho-lang/morpho.git
        cd morpho
        cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
        cmake --build build --config Release
        sudo cmake --install build --config Release
        sudo mkdir -p /usr/local/lib/morpho

    - name: Build and install morpho-cli
      run: |
        git clone --depth 1 --branch inline https://github.com/Morpho-lang/morpho-cli.git
        cd morpho-cli
        cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
        cmake --build build --config Release
        sudo cmake --install build --config Release

    - name: Smoke test morphopm
      run: |
        chmod +x .github/scripts/run-morphopm.sh
        .github/scripts/run-morphopm.sh version
        .github/scripts/run-morphopm.sh help
        .github/scripts/run-morphopm.sh list
